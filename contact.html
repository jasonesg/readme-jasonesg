<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F4EXNB5M6V"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Jason</title>
  
  <style>
    :root {
      --bg-color: #F3F3F3;
      --text-color: #333333;
      --nav-bg: #F3F3F3;
      --link-color: #0066ff;
      --border-color: #cccccc;
    }

    [data-theme="dark"] {
      --bg-color: #111111;
      --text-color: #eeeeee;
      --nav-bg: #111111;
      --link-color: #66b3ff;
      --border-color: #444444;
    }

    body {
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Iowan Old Style BT', Georgia, serif;
      font-size: 11pt; 
      transition: background-color 0.3s, color 0.3s;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      left: 40px; 
      top: 40px;
      width: 150px; 
      background-color: var(--nav-bg); 
      padding: 0; 
      z-index: 100;
      transition: background-color 0.3s;
    }
    nav a {
      display: block; 
      text-decoration: none;
      margin-bottom: 10px;
      color: var(--link-color);
    }
    nav a:hover {
      text-decoration: underline;
    }

    .nav-extras {
      margin-top: 30px;
      font-family: monospace;
      font-size: 10pt;
      color: var(--text-color);
    }
    .theme-toggle {
      background: none;
      border: none; 
      color: var(--text-color);
      cursor: pointer;
      padding: 0; 
      margin-top: 10px;
      font-size: 14pt; 
      line-height: 1;
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    .theme-toggle:hover {
      background-color: rgba(0,0,0,0.05); 
    }

    .content {
      max-width: 650px; 
      margin: 40px auto; 
      line-height: 1.6;
      padding-bottom: 50px;
    }

    h1 {
      line-height: 1.2;
      margin-bottom: 20px;
    }
    
    a {
      color: var(--link-color);
    }

    .socials {
      margin-top: 20px;
      margin-bottom: 20px;
      color: var(--text-color);
      opacity: 0.8;
    }
    .socials a {
      margin-right: 10px;
    }
    
    .site-footer {
      border-top: 1px solid var(--border-color);
      margin-top: 40px;
      padding-top: 20px;
      color: var(--text-color);
      opacity: 0.7;
      font-size: 10pt;
    }

    @media (max-width: 1030px) {
      body {
        padding-top: 60px;
        padding-left: 20px;
        padding-right: 20px;
      }
      .content {
        max-width: 100%;
        margin: 20px auto; 
      }
      nav {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        padding: 10px 20px;
        box-sizing: border-box;
        display: flex;
        align-items: center; 
        justify-content: space-between; 
        border-bottom: 1px solid var(--border-color);
      }
      .nav-links {
        display: flex;
      }
      .nav-links a {
        display: inline-block; 
        margin-right: 15px;
        margin-bottom: 0;
        font-size: 10pt;
      }
      .nav-extras {
        margin-top: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .theme-toggle {
        margin-top: 0;
        padding: 0 5px; 
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About me</a>
      <a href="contact.html">Contact</a>
    </div>

    <div class="nav-extras">
      <div id="clock">00:00:00 AM</div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🫩</button>
    </div>
  </nav>

  <div class="content">
    <header>
      <h1>Contact me</h1>
    </header>

    <main role="main">
      <section aria-label="Contact details">
          
        <p>For other queries please email me directly @ <a href="mailto:jason@taskboard.org">jason@taskboard.org</a></p>
        
    <div class="socials" aria-label="Social links">
      Check out my
      <a href="https://twitter.com/jasonesg" target="_blank" rel="noopener">twtr</a>
      <a href="https://instagram.com/jasonesg/" target="_blank" rel="noopener">insta</a>
      <a href="https://tiktok.com/@jasonesg" target="_blank" rel="noopener">tiktok</a>
    </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026.</p>
    </footer>

  </div>

  <script>
    // 1. Clock Functionality
    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('en-US', { 
        hour12: true, 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit' 
      });
      const clockElement = document.getElementById('clock');
      if (clockElement) {
        clockElement.textContent = timeString;
      }
    }
    updateClock();
    setInterval(updateClock, 1000);

    // 2. Auto-Theming & Toggle Functionality
    const toggleButton = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;
    
    // Check what time it is (getHours returns 0-23)
    const currentHour = new Date().getHours();
    
    // 8 AM is 8, 8 PM is 20. Day time is >= 8 and < 20.
    const timeBasedTheme = (currentHour >= 8 && currentHour < 20) ? 'light' : 'dark';

    // Check if the user manually saved a preference. If not, use the time-based theme!
    const savedTheme = localStorage.getItem('theme');
    const activeTheme = savedTheme ? savedTheme : timeBasedTheme;

    // Apply the theme on load
    htmlElement.setAttribute('data-theme', activeTheme);
    
    // Function to update the button icon
    function updateButtonText(theme) {
      if (toggleButton) {
        toggleButton.textContent = theme === 'dark' ? '🤠' : '🫩';
      }
    }

    // Set initial button icon on load
    updateButtonText(activeTheme);

    // Handle manual toggles
    if (toggleButton) {
      toggleButton.addEventListener('click', function() {
        const current = htmlElement.getAttribute('data-theme');
        if (current === 'dark') {
          htmlElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
          updateButtonText('light');
        } else {
          htmlElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
          updateButtonText('dark');
        }
      });
    }
  </script>
  
</body>
</html>
